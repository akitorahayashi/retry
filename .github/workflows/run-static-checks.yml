# Static Checks Workflow
#
# Runs formatting checks, Biome lint, TypeScript typecheck, and dist verification.

name: Run Static Checks

on:
  workflow_call:

permissions:
  contents: read

jobs:
  run-static-checks:
    name: Run Static Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Development Environment
        uses: ./.github/actions/setup

      - name: Check Formatting
        run: just format:check

      - name: Lint Code
        run: just lint

      - name: Typecheck
        run: just typecheck

      - name: Verify Dist
        run: just verify:dist
