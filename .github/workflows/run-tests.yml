# Test Workflow
#
# Runs Vitest tests.

name: Run Tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  run-tests:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Development Environment
        uses: ./.github/actions/setup

      - name: Run Vitest
        run: just test
