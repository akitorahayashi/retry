# Release Workflow
#
# Builds and publishes GitHub releases on tag push.

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  resolve-version:
    name: Resolve Release Version
    runs-on: ubuntu-latest
    outputs:
      major-tag: ${{ steps.version.outputs.major_tag }}

    steps:
      - id: version
        name: Resolve release tags
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Expected release tag in vX.Y.Z format, got '${GITHUB_REF_NAME}'." >&2
            exit 1
          fi
          echo "major_tag=v${BASH_REMATCH[1]}" >> "${GITHUB_OUTPUT}"

  static-checks:
    name: Static Checks
    uses: ./.github/workflows/run-static-checks.yml

  test:
    name: Test
    uses: ./.github/workflows/run-tests.yml

  verify-e2e-linux:
    name: Verify E2E Linux
    uses: ./.github/workflows/verify-e2e-linux.yml

  release:
    name: Publish Release
    needs: [resolve-version, static-checks, test, verify-e2e-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda
        with:
          generate_release_notes: true

  move-major-tag:
    name: Move Major Tag
    needs: [resolve-version, release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: move-major-tag-${{ needs.resolve-version.outputs.major-tag }}
      cancel-in-progress: true

    steps:
      - name: Checkout Tagged Revision
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.ref }}

      - name: Update moving major tag
        env:
          MAJOR_TAG: ${{ needs.resolve-version.outputs.major-tag }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag --force --annotate "${MAJOR_TAG}" --message "Update ${MAJOR_TAG} to ${GITHUB_REF_NAME}" "${GITHUB_SHA}"
          git push origin "refs/tags/${MAJOR_TAG}" --force
