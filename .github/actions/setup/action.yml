name: Setup Node Environment
description: Install Node.js, setup just, and install npm dependencies

inputs:
  node-version-file:
    description: Node.js version file path
    required: false
    default: .nvmrc

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version-file: ${{ inputs.node-version-file }}
        cache: npm

    - name: Setup just
      uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6
      with:
        just-version: 1.46.0

    - name: Run just setup
      run: just setup
      shell: bash
